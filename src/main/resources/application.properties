# NovaAgent · Phase 1 default configuration
#
# Override priority: env var > ~/.novaagent/config.properties > this file
#
#   api.key              -> NOVAAGENT_API_KEY
#   api.baseUrl          -> NOVAAGENT_BASE_URL
#   api.model            -> NOVAAGENT_MODEL
#   websearch.key        -> NOVAAGENT_WEBSEARCH_KEY
#   websearch.url        -> NOVAAGENT_WEBSEARCH_URL

api.baseUrl=https://open.bigmodel.cn/api/coding/paas/v4
api.model=glm-5.1
websearch.url=https://open.bigmodel.cn/api/paas/v4/web_search

agent.maxSteps=8
agent.maxToolOutputChars=4000
agent.requestTimeoutSeconds=60